schema:
  version: 5

global:
  language: rust
  application_name: TextDocument
  organisation:
    name: text-document
    domain: text-document.dev
  prefix_path: crates

entities:
  # ── Base ────────────────────────────────────────────────────
  - name: EntityBase
    only_for_heritage: true
    fields:
      - name: id
        type: uinteger
      - name: created_at
        type: datetime
      - name: updated_at
        type: datetime

  # ── Root (non-undoable application entry point) ─────────────
  - name: Root
    inherits_from: EntityBase
    undoable: false
    fields:
      - name: document
        type: entity
        entity: Document
        relationship: one_to_one
        strong: true

  # ── Document (the main document entity, undoable trunk) ─────
  #    Owns ALL frames (flat ownership). The tree structure is
  #    expressed via Frame.parent_frame references, not via
  #    recursive strong ownership (which Qleany forbids).
  - name: Document
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: title
        type: string
      - name: frames
        type: entity
        entity: Frame
        relationship: ordered_one_to_many
        strong: true
      - name: text_direction
        type: enum
        enum_name: TextDirection
        enum_values:
          - LeftToRight
          - RightToLeft
      - name: default_wrap_mode
        type: enum
        enum_name: WrapMode
        enum_values:
          - NoWrap
          - WordWrap
          - WrapAnywhere
          - WrapAtWordBoundaryOrAnywhere
      - name: resources
        type: entity
        entity: Resource
        relationship: one_to_many
        strong: true
      - name: lists
        type: entity
        entity: List
        relationship: one_to_many
        strong: true
      - name: tables
        type: entity
        entity: Table
        relationship: one_to_many
        strong: true
      # ── Cached document stats (maintained by editing use cases) ──
      # These avoid full tree walks for get_document_stats and isEmpty().
      - name: character_count
        type: integer
      - name: block_count
        type: integer

  # ── Frame (container: holds blocks and nested frames) ───────
  #    Document owns all frames. Nesting is expressed via the
  #    parent_frame weak reference. The first frame (index 0)
  #    in the document's list is the root frame.
  - name: Frame
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: parent_frame
        type: entity
        entity: Frame
        relationship: many_to_one
        optional: true
      - name: blocks
        type: entity
        entity: Block
        relationship: ordered_one_to_many
        strong: true
      # ── Child ordering (solves block/sub-frame interleaving) ──
      - name: child_order
        type: integer
        is_list: true
      # ── FrameFormat (all optional: None = inherit/default) ──
      - name: fmt_height
        type: integer
        optional: true
      - name: fmt_width
        type: integer
        optional: true
      - name: fmt_top_margin
        type: integer
        optional: true
      - name: fmt_bottom_margin
        type: integer
        optional: true
      - name: fmt_left_margin
        type: integer
        optional: true
      - name: fmt_right_margin
        type: integer
        optional: true
      - name: fmt_padding
        type: integer
        optional: true
      - name: fmt_border
        type: integer
        optional: true
      - name: fmt_position
        type: enum
        enum_name: FramePosition
        enum_values:
          - InFlow
          - FloatLeft
          - FloatRight
        optional: true
      - name: table
        type: entity
        entity: Table
        relationship: many_to_one
        optional: true

  # ── Block (paragraph-level container: holds inline elements) ─
  - name: Block
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: elements
        type: entity
        entity: InlineElement
        relationship: ordered_one_to_many
        strong: true
      - name: list
        type: entity
        entity: List
        relationship: many_to_one
        optional: true
      # ── Cached fields (maintained by editing use cases) ──
      - name: text_length
        type: integer
      - name: document_position
        type: integer
      - name: plain_text
        type: string
      # ── BlockFormat (all optional: None = inherit/default) ──
      - name: fmt_alignment
        type: enum
        enum_name: Alignment
        enum_values:
          - Left
          - Right
          - Center
          - Justify
        optional: true
      - name: fmt_top_margin
        type: integer
        optional: true
      - name: fmt_bottom_margin
        type: integer
        optional: true
      - name: fmt_left_margin
        type: integer
        optional: true
      - name: fmt_right_margin
        type: integer
        optional: true
      - name: fmt_heading_level
        type: integer
        optional: true
      - name: fmt_indent
        type: integer
        optional: true
      - name: fmt_text_indent
        type: integer
        optional: true
      - name: fmt_marker
        type: enum
        enum_name: MarkerType
        enum_values:
          - NoMarker
          - Unchecked
          - Checked
        optional: true
      - name: fmt_tab_positions
        type: integer
        is_list: true

  # ── InlineElement (text run or image within a block) ────────
  #    The content field is a complex Rust enum that carries the
  #    actual data: Text(String) or Image { name, width, height, quality }.
  #    No dead fields. Block.elements (ordered_one_to_many) preserves
  #    the interleaved visual sequence.
  - name: InlineElement
    inherits_from: EntityBase
    undoable: true
    fields:
      # ── Content (complex enum: Text or Image) ──
      - name: content
        type: enum
        enum_name: InlineContent
        enum_values:
          - Empty
          - "Text(String)"
          - "Image { name: String, width: i64, height: i64, quality: i64 }"
      # ── CharFormat / TextFormat (all optional: None = inherit/default) ──
      - name: fmt_font_family
        type: string
        optional: true
      - name: fmt_font_point_size
        type: integer
        optional: true
      - name: fmt_font_weight
        type: integer
        optional: true
      - name: fmt_font_bold
        type: boolean
        optional: true
      - name: fmt_font_italic
        type: boolean
        optional: true
      - name: fmt_font_underline
        type: boolean
        optional: true
      - name: fmt_font_overline
        type: boolean
        optional: true
      - name: fmt_font_strikeout
        type: boolean
        optional: true
      - name: fmt_letter_spacing
        type: integer
        optional: true
      - name: fmt_word_spacing
        type: integer
        optional: true
      - name: fmt_anchor_href
        type: string
        optional: true
      - name: fmt_anchor_names
        type: string
        is_list: true
      - name: fmt_is_anchor
        type: boolean
        optional: true
      - name: fmt_tooltip
        type: string
        optional: true
      - name: fmt_underline_style
        type: enum
        enum_name: UnderlineStyle
        enum_values:
          - NoUnderline
          - SingleUnderline
          - DashUnderline
          - DotLine
          - DashDotLine
          - DashDotDotLine
          - WaveUnderline
          - SpellCheckUnderline
        optional: true
      - name: fmt_vertical_alignment
        type: enum
        enum_name: CharVerticalAlignment
        enum_values:
          - Normal
          - SuperScript
          - SubScript
          - Middle
          - Bottom
          - Top
          - Baseline
        optional: true

  # ── List (groups consecutive blocks into a numbered/bulleted list) ─
  #    Document owns all lists. Blocks reference their list via
  #    Block.list (many_to_one, optional). Multiple blocks can belong
  #    to the same list. A block with list = None is not in any list.
  - name: List
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: style
        type: enum
        enum_name: ListStyle
        enum_values:
          - Disc
          - Circle
          - Square
          - Decimal
          - LowerAlpha
          - UpperAlpha
          - LowerRoman
          - UpperRoman
      - name: indent
        type: integer
      - name: prefix
        type: string
      - name: suffix
        type: string

  # ── Resource (binary/text resource referenced by name from elements) ─
  #    Document owns all resources. InlineElement.image_name references
  #    a resource by name. Resource types: Image, StyleSheet, etc.
  - name: Resource
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: resource_type
        type: enum
        enum_name: ResourceType
        enum_values:
          - Image
          - StyleSheet
          - Other
      - name: name
        type: string
      - name: url
        type: string
      - name: mime_type
        type: string
      - name: data_base64
        type: string

  # ── Table (grid structure for tabular data) ────────────────────
  #    Document owns all tables. A table is anchored in the
  #    document flow via a Frame (Frame.table weak reference).
  #    Each cell points to a Frame that holds its rich content
  #    (Block → InlineElement), reusing the full editing stack.
  - name: Table
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: cells
        type: entity
        entity: TableCell
        relationship: ordered_one_to_many
        strong: true
      - name: rows
        type: integer
      - name: columns
        type: integer
      - name: column_widths
        type: integer
        is_list: true
      - name: fmt_border
        type: integer
        optional: true
      - name: fmt_cell_spacing
        type: integer
        optional: true
      - name: fmt_cell_padding
        type: integer
        optional: true
      - name: fmt_width
        type: integer
        optional: true
      - name: fmt_alignment
        type: enum
        enum_name: Alignment
        enum_values:
          - Left
          - Right
          - Center
          - Justify
        optional: true

  # ── TableCell (one cell in a table grid) ──────────────────────
  #    Owned by Table. Each cell references a Frame (weak) that
  #    holds its content blocks. row_span/column_span support
  #    merged cells.
  - name: TableCell
    inherits_from: EntityBase
    undoable: true
    fields:
      - name: row
        type: integer
      - name: column
        type: integer
      - name: row_span
        type: integer
      - name: column_span
        type: integer
      - name: cell_frame
        type: entity
        entity: Frame
        relationship: many_to_one
        optional: true
      - name: fmt_padding
        type: integer
        optional: true
      - name: fmt_border
        type: integer
        optional: true
      - name: fmt_vertical_alignment
        type: enum
        enum_name: CellVerticalAlignment
        enum_values:
          - Top
          - Middle
          - Bottom
        optional: true
      - name: fmt_background_color
        type: string
        optional: true

# ── Features ──────────────────────────────────────────────────
features:
  # ── Document Editing (cursor-based text manipulation) ───────
  - name: document_editing
    use_cases:
      - name: insert_text
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: InsertTextDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: text
              type: string
        dto_out:
          name: InsertTextResultDto
          fields:
            - name: new_position
              type: integer
            - name: blocks_affected
              type: integer

      - name: delete_text
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: DeleteTextDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
        dto_out:
          name: DeleteTextResultDto
          fields:
            - name: new_position
              type: integer
            - name: deleted_text
              type: string

      - name: insert_block
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: InsertBlockDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
        dto_out:
          name: InsertBlockResultDto
          fields:
            - name: new_position
              type: integer
            - name: new_block_id
              type: integer

      - name: insert_image
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: InsertImageDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: image_name
              type: string
            - name: width
              type: integer
            - name: height
              type: integer
        dto_out:
          name: InsertImageResultDto
          fields:
            - name: new_position
              type: integer
            - name: element_id
              type: integer

      - name: insert_frame
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: InsertFrameDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
        dto_out:
          name: InsertFrameResultDto
          fields:
            - name: frame_id
              type: integer

      - name: insert_formatted_text
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: InsertFormattedTextDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: text
              type: string
            - name: font_family
              type: string
            - name: font_point_size
              type: integer
            - name: font_bold
              type: boolean
            - name: font_italic
              type: boolean
            - name: font_underline
              type: boolean
            - name: font_strikeout
              type: boolean
        dto_out:
          name: InsertFormattedTextResultDto
          fields:
            - name: new_position
              type: integer

      - name: create_list
        undoable: true
        entities: [Document, Block, List]
        dto_in:
          name: CreateListDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: style
              type: enum
              enum_name: ListStyle
              enum_values:
                - Disc
                - Circle
                - Square
                - Decimal
                - LowerAlpha
                - UpperAlpha
                - LowerRoman
                - UpperRoman
        dto_out:
          name: CreateListResultDto
          fields:
            - name: list_id
              type: integer

      - name: insert_list
        undoable: true
        entities: [Document, Frame, Block, InlineElement, List]
        dto_in:
          name: InsertListDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: style
              type: enum
              enum_name: ListStyle
              enum_values:
                - Disc
                - Circle
                - Square
                - Decimal
                - LowerAlpha
                - UpperAlpha
                - LowerRoman
                - UpperRoman
        dto_out:
          name: InsertListResultDto
          fields:
            - name: list_id
              type: integer
            - name: new_position
              type: integer

      - name: insert_fragment
        undoable: true
        entities: [Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_in:
          name: InsertFragmentDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: fragment_data
              type: string
        dto_out:
          name: InsertFragmentResultDto
          fields:
            - name: new_position
              type: integer
            - name: blocks_added
              type: integer

      - name: insert_html_at_position
        undoable: true
        entities: [Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_in:
          name: InsertHtmlAtPositionDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: html
              type: string
        dto_out:
          name: InsertHtmlAtPositionResultDto
          fields:
            - name: new_position
              type: integer
            - name: blocks_added
              type: integer

      - name: insert_markdown_at_position
        undoable: true
        entities: [Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_in:
          name: InsertMarkdownAtPositionDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: markdown
              type: string
        dto_out:
          name: InsertMarkdownAtPositionResultDto
          fields:
            - name: new_position
              type: integer
            - name: blocks_added
              type: integer

      - name: insert_table
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: InsertTableDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: rows
              type: integer
            - name: columns
              type: integer
        dto_out:
          name: InsertTableResultDto
          fields:
            - name: table_id
              type: integer
            - name: new_position
              type: integer

      - name: remove_table
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: RemoveTableDto
          fields:
            - name: table_id
              type: integer

      - name: insert_table_row
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: InsertTableRowDto
          fields:
            - name: table_id
              type: integer
            - name: row_index
              type: integer
        dto_out:
          name: InsertTableRowResultDto
          fields:
            - name: new_row_count
              type: integer

      - name: insert_table_column
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: InsertTableColumnDto
          fields:
            - name: table_id
              type: integer
            - name: column_index
              type: integer
        dto_out:
          name: InsertTableColumnResultDto
          fields:
            - name: new_column_count
              type: integer

      - name: remove_table_row
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: RemoveTableRowDto
          fields:
            - name: table_id
              type: integer
            - name: row_index
              type: integer
        dto_out:
          name: RemoveTableRowResultDto
          fields:
            - name: new_row_count
              type: integer

      - name: remove_table_column
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: RemoveTableColumnDto
          fields:
            - name: table_id
              type: integer
            - name: column_index
              type: integer
        dto_out:
          name: RemoveTableColumnResultDto
          fields:
            - name: new_column_count
              type: integer

      - name: merge_table_cells
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: MergeTableCellsDto
          fields:
            - name: table_id
              type: integer
            - name: start_row
              type: integer
            - name: start_column
              type: integer
            - name: end_row
              type: integer
            - name: end_column
              type: integer
        dto_out:
          name: MergeTableCellsResultDto
          fields:
            - name: merged_cell_id
              type: integer

      - name: split_table_cell
        undoable: true
        entities: [Document, Frame, Block, InlineElement, Table, TableCell]
        dto_in:
          name: SplitTableCellDto
          fields:
            - name: cell_id
              type: integer
            - name: split_rows
              type: integer
            - name: split_columns
              type: integer
        dto_out:
          name: SplitTableCellResultDto
          fields:
            - name: new_cell_ids
              type: integer
              is_list: true

  # ── Document Formatting ─────────────────────────────────────
  - name: document_formatting
    use_cases:
      - name: set_text_format
        undoable: true
        entities: [Document, Block, InlineElement]
        dto_in:
          name: SetTextFormatDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: font_family
              type: string
              optional: true
            - name: font_point_size
              type: integer
              optional: true
            - name: font_weight
              type: integer
              optional: true
            - name: font_bold
              type: boolean
              optional: true
            - name: font_italic
              type: boolean
              optional: true
            - name: font_underline
              type: boolean
              optional: true
            - name: font_overline
              type: boolean
              optional: true
            - name: font_strikeout
              type: boolean
              optional: true
            - name: letter_spacing
              type: integer
              optional: true
            - name: word_spacing
              type: integer
              optional: true
            - name: underline_style
              type: enum
              enum_name: UnderlineStyle
              optional: true
              enum_values:
                - NoUnderline
                - SingleUnderline
                - DashUnderline
                - DotLine
                - DashDotLine
                - DashDotDotLine
                - WaveUnderline
                - SpellCheckUnderline
            - name: vertical_alignment
              type: enum
              enum_name: CharVerticalAlignment
              optional: true
              enum_values:
                - Normal
                - SuperScript
                - SubScript
                - Middle
                - Bottom
                - Top
                - Baseline

      - name: merge_text_format
        undoable: true
        entities: [Document, Block, InlineElement]
        dto_in:
          name: MergeTextFormatDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: font_family
              type: string
              optional: true
            - name: font_bold
              type: boolean
              optional: true
            - name: font_italic
              type: boolean
              optional: true
            - name: font_underline
              type: boolean
              optional: true

      - name: set_block_format
        undoable: true
        entities: [Document, Block]
        dto_in:
          name: SetBlockFormatDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: alignment
              type: enum
              enum_name: Alignment
              optional: true
              enum_values:
                - Left
                - Right
                - Center
                - Justify
            - name: heading_level
              type: integer
              optional: true
            - name: indent
              type: integer
              optional: true
            - name: marker
              type: enum
              enum_name: MarkerType
              optional: true
              enum_values:
                - NoMarker
                - Unchecked
                - Checked

      - name: set_frame_format
        undoable: true
        entities: [Document, Frame]
        dto_in:
          name: SetFrameFormatDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
            - name: frame_id
              type: integer
            - name: height
              type: integer
              optional: true
            - name: width
              type: integer
              optional: true
            - name: top_margin
              type: integer
              optional: true
            - name: bottom_margin
              type: integer
              optional: true
            - name: left_margin
              type: integer
              optional: true
            - name: right_margin
              type: integer
              optional: true
            - name: padding
              type: integer
              optional: true
            - name: border
              type: integer
              optional: true

      - name: set_table_format
        undoable: true
        entities: [Document, Table]
        dto_in:
          name: SetTableFormatDto
          fields:
            - name: table_id
              type: integer
            - name: border
              type: integer
              optional: true
            - name: cell_spacing
              type: integer
              optional: true
            - name: cell_padding
              type: integer
              optional: true
            - name: width
              type: integer
              optional: true
            - name: alignment
              type: enum
              enum_name: Alignment
              optional: true
              enum_values:
                - Left
                - Right
                - Center
                - Justify

      - name: set_table_cell_format
        undoable: true
        entities: [Table, TableCell]
        dto_in:
          name: SetTableCellFormatDto
          fields:
            - name: cell_id
              type: integer
            - name: padding
              type: integer
              optional: true
            - name: border
              type: integer
              optional: true
            - name: vertical_alignment
              type: enum
              enum_name: CellVerticalAlignment
              optional: true
              enum_values:
                - Top
                - Middle
                - Bottom
            - name: background_color
              type: string
              optional: true

  # ── Document I/O (import/export in various formats) ─────────
  - name: document_io
    use_cases:
      - name: import_plain_text
        undoable: false
        entities: [Root, Document, Frame, Block, InlineElement]
        dto_in:
          name: ImportPlainTextDto
          fields:
            - name: plain_text
              type: string

      - name: export_plain_text
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement]
        dto_out:
          name: ExportPlainTextDto
          fields:
            - name: plain_text
              type: string

      - name: import_markdown
        undoable: false
        long_operation: true
        entities: [Root, Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_in:
          name: ImportMarkdownDto
          fields:
            - name: markdown_text
              type: string
        dto_out:
          name: ImportMarkdownResultDto
          fields:
            - name: block_count
              type: integer

      - name: export_markdown
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_out:
          name: ExportMarkdownDto
          fields:
            - name: markdown_text
              type: string

      - name: import_html
        undoable: false
        long_operation: true
        entities: [Root, Document, Frame, Block, InlineElement, List, Resource, Table, TableCell]
        dto_in:
          name: ImportHtmlDto
          fields:
            - name: html_text
