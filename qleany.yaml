              type: string
            - name: paragraph_count
              type: integer

  # ── Document Search (find & replace) ────────────────────────
  - name: document_search
    use_cases:
      - name: find_text
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: FindTextDto
          fields:
            - name: query
              type: string
            - name: case_sensitive
              type: boolean
            - name: whole_word
              type: boolean
            - name: use_regex
              type: boolean
            - name: search_backward
              type: boolean
            - name: start_position
              type: integer
        dto_out:
          name: FindResultDto
          fields:
            - name: found
              type: boolean
            - name: position
              type: integer
            - name: length
              type: integer

      - name: find_all
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: FindAllDto
          fields:
            - name: query
              type: string
            - name: case_sensitive
              type: boolean
            - name: whole_word
              type: boolean
            - name: use_regex
              type: boolean
        dto_out:
          name: FindAllResultDto
          fields:
            - name: positions
              type: integer
              is_list: true
            - name: lengths
              type: integer
              is_list: true
            - name: count
              type: integer

      - name: replace_text
        undoable: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: ReplaceTextDto
          fields:
            - name: query
              type: string
            - name: replacement
              type: string
            - name: case_sensitive
              type: boolean
            - name: whole_word
              type: boolean
            - name: use_regex
              type: boolean
            - name: replace_all
              type: boolean
        dto_out:
          name: ReplaceResultDto
          fields:
            - name: replacements_count
              type: integer
            - name: skipped_cross_block
              type: integer

  # ── Document Inspection (read-only queries about structure) ──
  - name: document_inspection
    use_cases:
      - name: get_document_stats
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_out:
          name: DocumentStatsDto
          fields:
            - name: character_count
              type: integer
            - name: word_count
              type: integer
            - name: block_count
              type: integer
            - name: frame_count
              type: integer
            - name: image_count
              type: integer
            - name: list_count
              type: integer
            - name: table_count
              type: integer

      - name: get_text_at_position
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: GetTextAtPositionDto
          fields:
            - name: position
              type: integer
            - name: length
              type: integer
        dto_out:
          name: TextAtPositionDto
          fields:
            - name: text
              type: string
            - name: block_id
              type: integer
            - name: element_id
              type: integer

      - name: get_block_at_position
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement]
        dto_in:
          name: GetBlockAtPositionDto
          fields:
            - name: position
              type: integer
        dto_out:
          name: BlockInfoDto
          fields:
            - name: block_id
              type: integer
            - name: block_start
              type: integer
            - name: block_length
              type: integer
            - name: block_number
              type: integer

      - name: extract_fragment
        undoable: false
        read_only: true
        entities: [Document, Frame, Block, InlineElement, List, Table, TableCell]
        dto_in:
          name: ExtractFragmentDto
          fields:
            - name: position
              type: integer
            - name: anchor
              type: integer
        dto_out:
          name: ExtractFragmentResultDto
          fields:
            - name: fragment_data
              type: string
            - name: plain_text
              type: string
ui:
  rust_cli: true
